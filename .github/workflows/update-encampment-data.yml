name: Update Encampment Data

on:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update Tacoma encampment data
        run: ./scripts/update_encampment_data.sh

      - name: Commit updated data
        run: |
          if git diff --quiet data/ES_Encampment_Cleaning_Tracking.geojson; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ES_Encampment_Cleaning_Tracking.geojson
          git commit -m "chore(data): refresh Tacoma encampment GeoJSON"
          git push
